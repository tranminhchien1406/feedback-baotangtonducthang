<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<title>Đánh giá trải nghiệm</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#f5f5f5;text-align:center;padding:40px}

.logo{
width:140px;
margin-bottom:10px;
}

h1{color:#333;margin-top:5px}

.card{background:white;padding:30px;border-radius:12px;max-width:520px;margin:auto;box-shadow:0 10px 25px rgba(0,0,0,0.1)}

.emojis{display:flex;justify-content:space-between;margin-top:25px}

.emoji{font-size:48px;cursor:pointer;padding:10px;border-radius:10px;transition:0.2s}

.emoji:hover{background:#f0f0f0;transform:scale(1.2)}

.label{font-size:14px;margin-top:6px}

/* POPUP */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:14px;
text-align:center;
max-width:400px;
animation:fadeIn 0.3s ease;
}

.modal-content img{
width:140px;
margin-bottom:10px;
}

.thank-text{
font-size:20px;
font-weight:bold;
color:#2c7a2c;
}

@keyframes fadeIn{
from{transform:scale(0.9);opacity:0}
to{transform:scale(1);opacity:1}
}

</style>
</head>
<body>

<div class="card" id="ratingScreen">

<!-- LOGO BẢO TÀNG: có thể thay logo.png bằng link logo thật -->
<img class="logo" src="logo.png" alt="Logo Bao Tang Ton Duc Thang">

<h1>Đánh giá trải nghiệm</h1>
<p>Quý khách vui lòng cho biết mức độ hài lòng sau khi tham quan</p>

<div class="emojis">

<div onclick="submitRating('Không hài lòng')">
<div class="emoji">😡</div>
<div class="label">Không hài lòng</div>
</div>

<div onclick="submitRating('Bình thường')">
<div class="emoji">😐</div>
<div class="label">Bình thường</div>
</div>

<div onclick="submitRating('Hài lòng')">
<div class="emoji">😊</div>
<div class="label">Hài lòng</div>
</div>

<div onclick="submitRating('Rất hài lòng')">
<div class="emoji">😍</div>
<div class="label">Rất hài lòng</div>
</div>

</div>
</div>

<!-- POPUP CẢM ƠN -->
<div class="modal" id="thankModal">
<div class="modal-content">

<img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png" alt="bow thank you">

<div class="thank-text">Cảm ơn quý khách đã đánh giá!</div>
<p>Chúc quý khách một ngày tốt đẹp</p>

</div>
</div>

<!-- ÂM THANH TING -->
<audio id="tingSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5c6c7a9c89.mp3" type="audio/mpeg">
</audio>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbzQHYXOtC82-HSSkjOpCNXlzLyV82LutAxIOeYCw4nI5xSw5lcFLxIX2LexQ_GfKAse0w/exec";

function submitRating(rating){

// phát âm thanh ting
var sound = document.getElementById("tingSound");
sound.currentTime = 0;
sound.play();

fetch(scriptURL, {
method: 'POST',
mode: 'no-cors',
headers: {
'Content-Type': 'application/json'
},
body: JSON.stringify({
rating: rating,
time: new Date().toLocaleString()
})
});

showThankYou();
}

function showThankYou(){

let modal = document.getElementById("thankModal");

modal.style.display = "flex";

setTimeout(function(){
modal.style.display = "none";
},3000);

}

</script>

</body>
</html>
