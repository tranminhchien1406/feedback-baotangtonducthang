<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visitor Experience Rating</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin:0;
    padding:0;
    background-image:url("https://baotangtonducthang.vn/upload/filemanage/z4766334399729_cf94ba7d6139a98a98f7e30ce41336b3.jpg");
    background-size:cover;
    background-position:center;
}

.container{
    background:rgba(0,0,0,0.65);
    color:white;
    max-width:800px;
    margin:60px auto;
    padding:40px;
    border-radius:15px;
}

.logo{
    width:120px;
    margin-bottom:20px;
}

h1{
    margin-bottom:30px;
}

.rating{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.btn{
    font-size:55px;
    cursor:pointer;
    transition:all 0.25s ease;
}

.btn span{
    display:block;
    font-size:16px;
    margin-top:8px;
}

.btn:hover{
    transform:scale(1.25);
}

.glow{
    transform:scale(1.35);
    text-shadow:
        0 0 10px #fff,
        0 0 20px #ffd700,
        0 0 30px #ffd700,
        0 0 40px #ffae00;
}

.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-content{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    animation:popup 0.45s ease;
}

.popup-content h2{
    color:#222;
    font-size:26px;
}

.popup-content p{
    color:#444;
    font-size:18px;
}

.popup img{
    width:150px;
    margin-top:15px;
    animation:robotBow 2.4s cubic-bezier(.4,0,.2,1) infinite;
    transform-origin:bottom center;
}

@keyframes popup{
    from{transform:scale(0.6);opacity:0}
    to{transform:scale(1);opacity:1}
}

@keyframes robotBow{
    0%{transform:rotate(0deg)}
    15%{transform:rotate(0deg)}
    35%{transform:rotate(10deg)}
    55%{transform:rotate(14deg)}
    75%{transform:rotate(6deg)}
    100%{transform:rotate(0deg)}
}

/* language button */
.lang-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    width:60px;
    height:40px;
    border:none;
    cursor:pointer;
    background:white;
    border-radius:6px;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.lang-btn img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:6px;
}

</style>
</head>

<body>

<div class="container">

<img class="logo" src="logo.png" alt="Logo">

<h1 id="title">Quý khách đánh giá trải nghiệm tham quan</h1>

<div class="rating">

<div class="btn" onclick="rate('Không hài lòng', this)">
😠
<span id="t1">Không hài lòng</span>
</div>

<div class="btn" onclick="rate('Bình thường', this)">
😐
<span id="t2">Bình thường</span>
</div>

<div class="btn" onclick="rate('Hài lòng', this)">
🙂
<span id="t3">Hài lòng</span>
</div>

<div class="btn" onclick="rate('Rất hài lòng', this)">
😍
<span id="t4">Rất hài lòng</span>
</div>

</div>

</div>

<audio id="ting">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b6b8c.mp3?filename=correct-2-46134.mp3" type="audio/mpeg">
</audio>

<div class="popup" id="popup">

<div class="popup-content">

<h2 id="thank">Cảm ơn quý khách đã đánh giá</h2>
<p id="wish">Chúc quý khách một ngày tốt lành</p>

<img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png" alt="Robot">

</div>

</div>

<button class="lang-btn" onclick="toggleLang()">
<img id="flag" src="https://flagcdn.com/w80/gb.png">
</button>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbw4J8roW6k9L3G_4U87I1qWBQoS44DYkxyq3-jQKZfuTUtZjkpoElYM-TsrR53ng_C1ug/exec";

function rate(value, el){

    document.getElementById("ting").play();

    el.classList.add("glow");

    setTimeout(()=>{
        el.classList.remove("glow");
    },600);

        const now = new Date();

    const data = {
        rating:value,
        date: now.toISOString().split('T')[0],   // yyyy-mm-dd
        hour: now.getHours()                     // hour of day
    };

    fetch(scriptURL,{
        method:"POST",
        body:JSON.stringify(data),
        headers:{"Content-Type":"application/json"}
    });

    const popup=document.getElementById("popup");
    popup.style.display="flex";

    setTimeout(()=>{
        popup.style.display="none";
    },2500);

}

let lang="vi";

function toggleLang(){

if(lang==="vi"){

lang="en";

document.getElementById("title").innerText="Please rate your visit experience";

document.getElementById("t1").innerText="Very Dissatisfied";
document.getElementById("t2").innerText="Neutral";
document.getElementById("t3").innerText="Satisfied";
document.getElementById("t4").innerText="Very Satisfied";

document.getElementById("thank").innerText="Thank you for your feedback";

document.getElementById("wish").innerText="Have a wonderful day";

document.getElementById("flag").src="https://flagcdn.com/w80/vn.png";

}else{

lang="vi";

document.getElementById("title").innerText="Quý khách đánh giá trải nghiệm tham quan";

document.getElementById("t1").innerText="Không hài lòng";
document.getElementById("t2").innerText="Bình thường";
document.getElementById("t3").innerText="Hài lòng";
document.getElementById("t4").innerText="Rất hài lòng";

document.getElementById("thank").innerText="Cảm ơn quý khách đã đánh giá";

document.getElementById("wish").innerText="Chúc quý khách một ngày tốt lành";

document.getElementById("flag").src="https://flagcdn.com/w80/gb.png";

}

}

</script>

</body>
</html>
